<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuHuShop 呼來選品</title>
    <script src="https://charset.net.tw/cdnjs/ajax/libs/liff/2.23.0/sdk.js"></script>
    <style>
        /* ... (保持你原本的 CSS 不變，這裡省略以節省篇幅) ... */
    </style>
</head>
<body>
   <script>
    const MY_LIFF_ID = "2010190278-1t2XrDnx"; 
    const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbyEyZ1OioaGpS4BkhjDlCNpeghPvoXiODQKIalxQogQRof0OuECABkQm4B2vVfRL8VK/exec"; 

    // 確保函數被正確定義
    async function initLiff() {
        console.log("LIFF 初始化中...");
        // 你的原有邏輯...
        loadProductsFromServer();
    }

async function loadProductsFromServer() {
        console.log("嘗試連接 API...");
        const container = document.getElementById("products-list");
        try {
            const response = await fetch(MY_GAS_URL);
            const data = await response.json();
            
            // 這裡將我們 API 回傳的 JSON 欄位對應到網頁程式碼的變數
            // 請確認你 Website 分頁的第一行標題真的是這些字
            productsCache = data.map(item => ({
                name: item['名稱'] || "未命名",
                price: item['價格'] || 0,
                status: item['類別'] || "一般", 
                img: item['圖片網址'] || "",
                specs: item['規格'] ? item['規格'].split(",") : ["單一規格"]
            }));
            
            console.log("資料載入成功:", productsCache);
            renderProductsHTML(productsCache);
        } catch (err) {
            console.error("載入失敗:", err);
            container.innerHTML = "<div style='grid-column: span 2; text-align:center;'>資料讀取錯誤，請確認部署權限。</div>";
        }
    }

    // 確保網頁載入後才執行
    window.addEventListener("load", function() {
        if (typeof initLiff === 'function') {
            initLiff();
        } else {
            console.error("initLiff 找不到！請檢查程式碼結構");
        }
    });
</script>
